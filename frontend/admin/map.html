<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
    <script src="../shared/js/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Map - Admin Panel</title>
    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../shared/css/style.css">
    <link rel="stylesheet" href="../shared/css/chic-styles.css">
    <style>
        /* Map Styles */
        #admin-large-map {
            height: 80vh;
            width: 100%;
            border-radius: 8px;
            z-index: 1;
        }
        
        .pulse-live {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #2E7D32;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(46, 125, 50, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(46, 125, 50, 0);
            }
        }
        
        @media (max-width: 768px) {
            #admin-large-map {
                height: 60vh;
            }
        }
    </style>
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <h4><i class="fas fa-seedling"></i> Aquametic</h4>
        </div>
        <nav class="nav flex-column">
            <a href="dashboard.html" class="nav-link" id="nav-dashboard">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="users.html" class="nav-link" id="nav-users">
                <i class="fas fa-users"></i> User Management
            </a>
            <a href="map.html" class="nav-link active" id="nav-system-map">
                <i class="fas fa-map-marked-alt"></i> System Map
            </a>
            <a href="monitoring.html" class="nav-link" id="nav-monitoring">
                <i class="fas fa-chart-line"></i> Monitoring
            </a>
            <a href="settings.html" class="nav-link" id="nav-settings">
                <i class="fas fa-cog"></i> Settings
            </a>
        </nav>
    </div>
    
    <!-- Top Navbar -->
    <nav class="top-navbar">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-dark d-md-none" id="sidebarToggle" style="font-size: 1.25rem; padding: 0.5rem 0.75rem; border-width: 2px;">
                <i class="fas fa-bars"></i>
            </button>
            <h5 class="mb-0 fw-semibold">System Map</h5>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span id="username-display" class="text-muted"><i class="fas fa-user-shield"></i> </span>
            <button id="logoutBtn" class="btn btn-outline-danger btn-sm">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <div class="d-flex align-items-center gap-2">
                        <h4 class="mb-1">
                            <i class="fas fa-globe-asia text-primary"></i> All Farm Plots
                        </h4>
                        <span class="pulse-live"></span>
                        <span class="badge bg-success">LIVE</span>
                    </div>
                    <p class="text-muted mb-0">Real-time view of all plots across the system</p>
                </div>
                <div>
                    <span class="badge bg-light text-dark border me-2">
                        <i class="fas fa-map-marker-alt"></i> Plots: <span id="total-plots-count">0</span>
                    </span>
                    <button class="btn btn-success btn-sm" id="refreshMapBtn">
                        <i class="fas fa-sync-alt"></i> Refresh Map
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Legend -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-body py-2">
                        <div class="d-flex align-items-center gap-4">
                            <span class="fw-semibold text-muted">
                                <i class="fas fa-info-circle"></i> Legend:
                            </span>
                            <span>
                                <i class="fas fa-map-marker-alt text-success"></i> Wet (Moisture ≥ 40%)
                            </span>
                            <span>
                                <i class="fas fa-map-marker-alt text-danger"></i> Dry (Moisture < 40%)
                            </span>
                            <span>
                                <i class="fas fa-map-marker-alt text-secondary"></i> No Data
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Map Card -->
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h6 class="mb-0">
                    <i class="fas fa-map-marked-alt"></i> Interactive Map
                </h6>
                <span class="badge bg-light text-dark border">
                    <i class="fas fa-location-arrow"></i> Centered on Malaysia
                </span>
            </div>
            <div class="card-body p-3">
                <div id="admin-large-map"></div>
            </div>
            <div class="card-footer bg-white">
                <div class="text-muted small">
                    <i class="fas fa-info-circle"></i> Click on any marker to view plot details
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script type="module">
        import { checkAuth } from '../shared/js/auth.js';
        checkAuth();
    </script>
    <script type="module" src="js/map.js"></script>
</body>
</html>
