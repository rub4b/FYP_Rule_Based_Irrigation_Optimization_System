<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - Aquametic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../shared/css/auth-styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="fas fa-user-shield fa-3x text-danger mb-3"></i>
                <h2 class="text-danger">Admin Registration</h2>
                <p class="text-muted">Create an administrator account</p>
            </div>

            <div class="alert alert-warning">
                <i class="fas fa-exclamation-triangle"></i>
                <strong>Restricted Access:</strong> Admin secret key required
            </div>

            <form id="adminRegisterForm">
                <!-- Username -->
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" class="form-control" id="username" required>
                </div>

                <!-- Full Name -->
                <div class="mb-3">
                    <label for="name" class="form-label">
                        <i class="fas fa-id-card"></i> Full Name
                    </label>
                    <input type="text" class="form-control" id="name" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" class="form-control" id="email" required>
                </div>

                <!-- Phone (Optional) -->
                <div class="mb-3">
                    <label for="phone" class="form-label">
                        <i class="fas fa-phone"></i> Phone (Optional)
                    </label>
                    <input type="tel" class="form-control" id="phone">
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" class="form-control" id="password" required>
                    
                    <!-- Password Requirements -->
                    <div id="passwordRequirements" class="password-requirements-box mt-2" style="display: none;">
                        <div class="requirement" id="req-length">
                            <i class="fas fa-circle"></i>
                            <span>At least 6 characters</span>
                        </div>
                        <div class="requirement" id="req-uppercase">
                            <i class="fas fa-circle"></i>
                            <span>One uppercase letter</span>
                        </div>
                        <div class="requirement" id="req-lowercase">
                            <i class="fas fa-circle"></i>
                            <span>One lowercase letter</span>
                        </div>
                        <div class="requirement" id="req-number">
                            <i class="fas fa-circle"></i>
                            <span>One number</span>
                        </div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">
                        <i class="fas fa-lock"></i> Confirm Password
                    </label>
                    <input type="password" class="form-control" id="confirmPassword" required>
                </div>

                <!-- Admin Secret -->
                <div class="mb-3">
                    <label for="adminSecret" class="form-label">
                        <i class="fas fa-key"></i> Admin Secret Key
                    </label>
                    <input type="password" class="form-control" id="adminSecret" required placeholder="Enter admin secret">
                    <small class="text-muted">Contact system administrator for the secret key</small>
                </div>

                <!-- Error Message -->
                <div id="error-message" class="alert alert-danger d-none" role="alert">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text"></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-danger w-100">
                    <i class="fas fa-user-plus"></i> Register Admin
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="../auth/index.html" class="text-muted">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

    <style>
        .password-requirements-box {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.8rem;
        }
        
        .password-requirements-box .requirement {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            color: #856404;
            transition: color 0.2s ease;
        }
        
        .password-requirements-box .requirement:last-child {
            margin-bottom: 0;
        }
        
        .password-requirements-box .requirement i {
            font-size: 0.5rem;
            margin-right: 8px;
            width: 12px;
        }
        
        .password-requirements-box .requirement.met {
            color: #155724;
        }
        
        .password-requirements-box .requirement.met i {
            color: #28a745;
        }
        
        .password-requirements-box .requirement.met i:before {
            content: "\f058";
            font-size: 0.9rem;
        }
    </style>
    
    <script>
        // Real-time password validation
        const passwordInput = document.getElementById('password');
        const requirementsBox = document.getElementById('passwordRequirements');
        
        const requirements = {
            length: { element: document.getElementById('req-length'), test: (pwd) => pwd.length >= 6 },
            uppercase: { element: document.getElementById('req-uppercase'), test: (pwd) => /[A-Z]/.test(pwd) },
            lowercase: { element: document.getElementById('req-lowercase'), test: (pwd) => /[a-z]/.test(pwd) },
            number: { element: document.getElementById('req-number'), test: (pwd) => /\d/.test(pwd) }
        };
        
        passwordInput.addEventListener('focus', () => {
            requirementsBox.style.display = 'block';
        });
        
        passwordInput.addEventListener('input', (e) => {
            const password = e.target.value;
            
            Object.values(requirements).forEach(req => {
                if (req.test(password)) {
                    req.element.classList.add('met');
                } else {
                    req.element.classList.remove('met');
                }
            });
        });
        
        passwordInput.addEventListener('blur', () => {
            if (!passwordInput.value) {
                setTimeout(() => {
                    requirementsBox.style.display = 'none';
                }, 200);
            }
        });
    </script>
    
    <script type="module">
        const API_BASE_URL = 'http://localhost:5000/api';
        const form = document.getElementById('adminRegisterForm');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('d-none');

            const username = document.getElementById('username').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const adminSecret = document.getElementById('adminSecret').value;

            // Validate password match
            if (password !== confirmPassword) {
                errorText.textContent = 'Passwords do not match';
                errorMessage.classList.remove('d-none');
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register/admin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        name,
                        email,
                        phone,
                        password,
                        adminSecret
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('✅ Admin account created successfully! You can now login.');
                    window.location.href = '../auth/index.html';
                } else {
                    throw new Error(data.message || 'Registration failed');
                }
            } catch (error) {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                errorText.textContent = error.message;
                errorMessage.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
