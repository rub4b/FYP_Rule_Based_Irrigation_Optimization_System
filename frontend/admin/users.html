<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
    <script src="../shared/js/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin Panel</title>
    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../shared/css/style.css">
    <link rel="stylesheet" href="../shared/css/chic-styles.css">
    <style>
        /* User Avatar Styles */
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 14px;
        }
        
        .user-avatar.admin-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .user-avatar.farmer-avatar {
            background: linear-gradient(135deg, #2E7D32 0%, #43A047 100%);
        }
    </style>
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <h4><i class="fas fa-seedling"></i> Aquametic</h4>
        </div>
        <nav class="nav flex-column">
            <a href="dashboard.html" class="nav-link" id="nav-dashboard">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="users.html" class="nav-link active" id="nav-users">
                <i class="fas fa-users"></i> User Management
            </a>
            <a href="map.html" class="nav-link" id="nav-system-map">
                <i class="fas fa-map-marked-alt"></i> System Map
            </a>
            <a href="monitoring.html" class="nav-link" id="nav-monitoring">
                <i class="fas fa-chart-line"></i> Monitoring
            </a>
            <a href="settings.html" class="nav-link" id="nav-settings">
                <i class="fas fa-cog"></i> Settings
            </a>
            <a href="cost-settings.html" class="nav-link" id="nav-cost-settings">
                <i class="fas fa-money-bill-wave"></i> Cost Settings
            </a>
        </nav>
    </div>
    
    <!-- Top Navbar -->
    <nav class="top-navbar">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-dark d-md-none" id="sidebarToggle" style="font-size: 1.25rem; padding: 0.5rem 0.75rem; border-width: 2px;">
                <i class="fas fa-bars"></i>
            </button>
            <h5 class="mb-0 fw-semibold">User Management</h5>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span id="username-display" class="text-muted"><i class="fas fa-user-shield"></i> </span>
            <button id="logoutBtn" class="btn btn-outline-danger btn-sm">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="mb-1">
                        <i class="fas fa-users-cog text-primary"></i> Manage Users
                    </h4>
                    <p class="text-muted mb-0">View and manage all system users</p>
                </div>
                <div>
                    <span class="badge bg-light text-dark border me-2">
                        <i class="fas fa-users"></i> Total: <span id="total-users-count">0</span>
                    </span>
                    <button class="btn btn-success btn-sm" id="refreshBtn">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Users Table Card -->
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h6 class="mb-0">
                    <i class="fas fa-table"></i> All Users
                </h6>
                <div class="d-flex gap-2">
                    <span class="badge bg-primary">
                        <i class="fas fa-shield-alt"></i> <span id="admin-count">0</span> Admins
                    </span>
                    <span class="badge bg-success">
                        <i class="fas fa-user"></i> <span id="farmer-count">0</span> Farmers
                    </span>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" id="users-table">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 80px;">Avatar</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th style="width: 150px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <tr>
                                <td colspan="6" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <p class="text-muted mt-2 mb-0">Loading users...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white">
                <div class="text-muted small">
                    <i class="fas fa-info-circle"></i> Showing all registered users in the system
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script type="module">
        import { checkAuth } from '../shared/js/auth.js';
        checkAuth();
    </script>
    <script type="module" src="js/users.js"></script>
</body>
</html>
