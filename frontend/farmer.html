<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
    <script src="js/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2E7D32">
    <title>Farmer Dashboard - Farm Management System</title>
    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chic-styles.css">
    <link rel="manifest" href="manifest.json">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        /* No additional page-specific styles needed - all in chic-styles.css */
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <h4><i class="fas fa-seedling"></i> Aquametic</h4>
        </div>
        <nav class="nav flex-column">
            <a href="farmer.html" class="nav-link active" id="nav-dashboard">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="plots.html" class="nav-link" id="nav-plots">
                <i class="fas fa-map-marked-alt"></i> My Plots
            </a>
            <a href="analytics.html" class="nav-link" id="nav-analytics">
                <i class="fas fa-chart-line"></i> Analytics
            </a>
            <a href="sensors.html" class="nav-link" id="nav-sensors">
                <i class="fas fa-tachometer-alt"></i> Sensor Data
            </a>
            <a href="profile.html" class="nav-link">
                <i class="fas fa-user-cog"></i> Settings
            </a>
        </nav>
    </div>
    
    <!-- Top Navbar -->
    <nav class="top-navbar">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-dark d-md-none" id="sidebarToggle" style="font-size: 1.25rem; padding: 0.5rem 0.75rem; border-width: 2px;">
                <i class="fas fa-bars"></i>
            </button>
            <h5 class="mb-0 fw-semibold">Farmer Dashboard</h5>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span id="username-display" class="text-muted"><i class="fas fa-user-circle"></i> </span>
            <button id="logoutBtn" class="btn btn-outline-danger btn-sm">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Manual Input Section -->
        <section class="mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="fas fa-keyboard"></i> Manual Sensor Input</h5>
                </div>
                <div class="card-body">
                    <form id="manualInputForm" class="row g-3">
                        <div class="col-md-5">
                            <label for="manual-sensor-id" class="form-label">Sensor ID</label>
                            <select id="manual-sensor-id" name="sensor_id" class="form-select" required>
                                <option value="">Select a sensor...</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="manual-moisture" class="form-label">Moisture Value (%)</label>
                            <input type="number" id="manual-moisture" name="moisture_value" 
                                class="form-control" min="0" max="100" step="0.1" required>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-paper-plane"></i> Submit Reading
                            </button>
                        </div>
                        <div class="col-12">
                            <div id="manual-input-message" class="form-message"></div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
        
        <!-- Plots Section -->
        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4><i class="fas fa-map-marked-alt"></i> Your Plots</h4>
                <button id="dashboardAddPlotBtn" class="btn btn-success">
                    <i class="fas fa-plus-circle"></i> Add Plot
                </button>
            </div>
            <div id="plots-container" class="row g-3">
                <!-- Plots will be loaded here -->
            </div>
        </section>
        
        <!-- Smart Irrigation Advice Card -->
        <section id="advice-card" class="mb-4" style="display: none;">
            <div class="card shadow-sm border-primary">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0" id="advice-status"><i class="fas fa-lightbulb"></i> Irrigation Status</h5>
                </div>
                <div class="card-body">
                    <p id="advice-text" class="mb-2"></p>
                    <small id="weather-info" class="text-muted"></small>
                </div>
            </div>
        </section>
        
        <!-- Plot Map Section -->
        <section id="plot-map-section" class="mb-4" style="display: none;">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="fas fa-map"></i> Plot Location</h5>
                </div>
                <div class="card-body p-0">
                    <div id="plot-map" style="height: 400px; width: 100%;"></div>
                </div>
            </div>
        </section>
        
        <!-- Chart Section -->
        <section class="mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="fas fa-chart-area"></i> Moisture Trend</h5>
                </div>
                <div class="card-body">
                    <canvas id="moistureChart"></canvas>
                </div>
            </div>
        </section>
        
        <!-- Recent Sensor Data -->
        <section class="mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="fas fa-database"></i> Recent Sensor Data</h5>
                </div>
                <div class="card-body">
                    <div id="sensor-data-container">
                        <!-- Sensor data will be loaded here -->
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Bootstrap 5 JS Bundle (kept for layout only) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    
    <!-- Mobile Sidebar Toggle -->
    <script>
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.querySelector('.sidebar');
        
        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', function() {
                sidebar.classList.toggle('show');
            });
            
            // Close sidebar when clicking outside on mobile
            document.addEventListener('click', function(event) {
                if (window.innerWidth <= 768) {
                    if (!sidebar.contains(event.target) && !sidebarToggle.contains(event.target)) {
                        sidebar.classList.remove('show');
                    }
                }
            });
        }
    </script>
    
    <script>
        // Remove any Bootstrap modal backdrops to prevent freezing
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
            
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    mutation.addedNodes.forEach(function(node) {
                        if (node.classList && node.classList.contains('modal-backdrop')) {
                            node.remove();
                        }
                    });
                });
            });
            
            observer.observe(document.body, { childList: true });
        });
    </script>
    <script type="module">
        import { checkAuth } from './js/auth.js';
        checkAuth();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/enhancements.js"></script>
    <script type="module" src="js/farmer.js"></script>
</body>
</html>
