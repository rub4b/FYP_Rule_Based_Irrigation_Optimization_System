<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/auth-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2E7D32">
    <title>My Farm Plots - Aquametic</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chic-styles.css">
    <style>
        /* No additional page-specific styles needed */
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <h4><i class="fas fa-seedling"></i> Aquametic</h4>
        </div>
        <nav class="nav flex-column">
            <a href="farmer.html" class="nav-link" id="nav-dashboard">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="plots.html" class="nav-link active" id="nav-plots">
                <i class="fas fa-map-marked-alt"></i> My Plots
            </a>
            <a href="analytics.html" class="nav-link" id="nav-analytics">
                <i class="fas fa-chart-line"></i> Analytics
            </a>
            <a href="sensors.html" class="nav-link" id="nav-sensors">
                <i class="fas fa-tachometer-alt"></i> Sensor Data
            </a>
            <a href="profile.html" class="nav-link">
                <i class="fas fa-user-cog"></i> Settings
            </a>
        </nav>
    </div>
    
    <!-- Top Navbar -->
    <nav class="top-navbar">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-dark d-md-none" id="sidebarToggle" style="font-size: 1.25rem; padding: 0.5rem 0.75rem; border-width: 2px;">
                <i class="fas fa-bars"></i>
            </button>
            <h5 class="mb-0 fw-semibold">My Farm Plots</h5>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span id="username-display" class="text-muted"><i class="fas fa-user-circle"></i> </span>
            <button id="logoutBtn" class="btn btn-outline-danger btn-sm">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <div class="mb-4">
            <h4 class="mb-1"><i class="fas fa-map-marked-alt text-success"></i> My Farm Plots</h4>
            <p class="text-muted mb-0">View and manage your agricultural plots</p>
        </div>
        
        <!-- Plots Grid -->
        <div id="plots-container" class="row g-4">
            <!-- Plots will be loaded here -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="text-muted mt-2">Loading plots...</p>
            </div>
        </div>
    </div>

    <!-- SweetAlert2 is loaded in head, Bootstrap CSS is used for layout only -->
    <script>
        // Permanent fix: Remove any Bootstrap modal backdrops that might appear
        document.addEventListener('DOMContentLoaded', function() {
            // Remove existing backdrops
            document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
            
            // Watch for new backdrops being added and remove them immediately
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    mutation.addedNodes.forEach(function(node) {
                        if (node.classList && node.classList.contains('modal-backdrop')) {
                            node.remove();
                        }
                    });
                });
            });
            
            observer.observe(document.body, { childList: true });
        });
    </script>
    
    <!-- Mobile Sidebar Toggle -->
    <script>
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.querySelector('.sidebar');
        
        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', function() {
                sidebar.classList.toggle('show');
            });
            
            // Close sidebar when clicking outside on mobile
            document.addEventListener('click', function(event) {
                if (window.innerWidth <= 768) {
                    if (!sidebar.contains(event.target) && !sidebarToggle.contains(event.target)) {
                        sidebar.classList.remove('show');
                    }
                }
            });
        }
    </script>
    
    <!-- Edit Plot Modal -->
    <div id="editPlotModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #2E7D32, #66BB6A); color: white;">
                    <h5 class="modal-title"><i class="fas fa-edit"></i> Edit Plot</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editPlotForm">
                        <div class="mb-3">
                            <label for="editPlotName" class="form-label"><i class="fas fa-leaf text-success"></i> Plot Name</label>
                            <input type="text" class="form-control" id="editPlotName" required>
                        </div>
                        <div class="mb-3">
                            <label for="editCropType" class="form-label"><i class="fas fa-seedling text-success"></i> Crop Type</label>
                            <input type="text" class="form-control" id="editCropType" placeholder="e.g., Wheat, Rice, Corn">
                        </div>
                        <div class="mb-3">
                            <label for="editLocation" class="form-label"><i class="fas fa-map-marker-alt text-warning"></i> Location</label>
                            <input type="text" class="form-control" id="editLocation" placeholder="Plot location">
                        </div>
                        <div class="mb-3">
                            <label for="editArea" class="form-label"><i class="fas fa-ruler text-info"></i> Plot Area (hectares)</label>
                            <input type="number" class="form-control" id="editArea" step="0.01" placeholder="e.g., 2.5">
                        </div>
                        <div class="mb-3">
                            <label for="editSensorId" class="form-label"><i class="fas fa-microchip text-success"></i> Sensor ID</label>
                            <input type="text" class="form-control" id="editSensorId" readonly style="background-color: #f5f5f5;">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" id="savePlotBtn">
                        <i class="fas fa-check"></i> Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { checkAuth } from './js/auth.js?v=3';
        checkAuth();
    </script>
    <script src="js/enhancements.js"></script>
    <script type="module" src="js/plots.js?v=3"></script>
</body>
</html>
