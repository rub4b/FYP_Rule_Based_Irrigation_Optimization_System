<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Aquametic Smart Farming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chic-styles.css">
    <link rel="stylesheet" href="css/auth-styles.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        .login-image-section {
            background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
            position: relative;
            overflow: hidden;
            min-height: 100vh;
        }
        
        .login-image-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?w=1200');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
        }
        
        .overlay-content {
            position: relative;
            z-index: 1;
            color: white;
            padding: 60px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .overlay-content h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .overlay-content p {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .feature-list {
            list-style: none;
            padding: 0;
        }
        
        .feature-list li {
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding-left: 30px;
            position: relative;
        }
        
        .feature-list li::before {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: 0;
            color: #F9A825;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            max-width: 450px;
            width: 100%;
        }
        
        .login-card .brand-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-card .brand-logo i {
            font-size: 3rem;
            color: #2E7D32;
            margin-bottom: 15px;
        }
        
        .login-card h2 {
            color: #2E7D32;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .login-card .subtitle {
            text-align: center;
            color: #78909C;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }
        
        .form-floating > label {
            color: #78909C;
        }
        
        .form-floating input:focus ~ label {
            color: #2E7D32;
        }
        
        .form-floating input:focus {
            border-color: #2E7D32;
            box-shadow: 0 0 0 0.25rem rgba(46, 125, 50, 0.15);
        }
        
        .btn-primary {
            background-color: #2E7D32;
            border: none;
            padding: 15px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background-color: #1B5E20;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
        }
        
        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #78909C;
            font-size: 0.9rem;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #78909C;
        }
        
        .register-link a {
            color: #2E7D32;
            text-decoration: none;
            font-weight: 600;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 991px) {
            .login-image-section {
                display: none;
            }
            
            .overlay-content h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0" style="height: 100vh;">
            <!-- Left Column - Image Section -->
            <div class="col-lg-7 login-image-section animate__animated animate__fadeIn">
                <div class="overlay-content">
                    <h1><i class="fas fa-seedling"></i> Welcome to Aquametic</h1>
                    <p>Smart Farming for the Future</p>
                    <ul class="feature-list">
                    </ul>
                </div>
            </div>
            
            <!-- Right Column - Form Section -->
            <div class="col-lg-5 d-flex align-items-center justify-content-center p-4" style="background-color: #F4F6F8;">
                <div class="login-card animate__animated animate__fadeInRight">
                    <div class="brand-logo">
                        <i class="fas fa-user-plus"></i>
                        <h2>Create Account</h2>
                        <p class="subtitle">Join us to start smart farming today</p>
                    </div>
                    
                    <form id="registerForm">
                        <!-- Full Name Input -->
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="fullname" name="fullname" placeholder="Full Name" required>
                            <label for="fullname">Full Name</label>
                        </div>
                        
                        <!-- Username Input -->
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                            <label for="username">Username</label>
                        </div>
                        
                        <!-- Email Input -->
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
                            <label for="email">Email</label>
                        </div>
                        
                        <!-- Role Selection -->
                        <div class="mb-3">
                            <label for="role" class="form-label" style="color: #78909C; font-size: 0.9rem; margin-bottom: 8px;">
                                <i class="fas fa-user-tag"></i> Select Role
                            </label>
                            <select class="form-select" id="role" name="role" required style="border: 2px solid #e0e0e0; border-radius: 12px; padding: 12px; font-size: 1rem;">
                                <option value="farmer" selected>Farmer</option>
                                <option value="admin">Administrator</option>
                            </select>
                            <small class="text-muted" style="font-size: 0.8rem;">
                                <i class="fas fa-info-circle"></i> Admins must login through the admin portal
                            </small>
                        </div>
                        
                        <!-- Password Input -->
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>
                        
                        <!-- Confirm Password Input -->
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
                            <label for="confirmPassword">Confirm Password</label>
                        </div>
                        
                        <!-- Error Message -->
                        <div id="error-message" class="alert alert-danger d-none" role="alert">
                            <i class="fas fa-exclamation-circle"></i> <span id="error-text"></span>
                        </div>
                        
                        <!-- Sign Up Button -->
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fas fa-user-plus"></i> Sign Up
                        </button>
                    </form>
                    
                    <div class="divider">
                        <span>OR</span>
                    </div>
                    
                    <div class="register-link">
                        Already have an account? <a href="index.html">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Enhancements -->
    <script src="js/enhancements.js"></script>
    <script>
        // Add floating particles animation
        document.addEventListener('DOMContentLoaded', () => {
            const leftSection = document.querySelector('.login-image-section');
            if (leftSection) {
                for (let i = 0; i < 20; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'floating-particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 5 + 's';
                    particle.style.animationDuration = (5 + Math.random() * 10) + 's';
                    leftSection.appendChild(particle);
                }
            }
        });
    </script>
    
    <script src="js/register.js"></script>
</body>
</html>
